<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CPI Calculator – GLA University</title>
<meta name="description" content="Instantly calculate your Cumulative Performance Index (CPI) with this user-friendly tool designed for GLA University students.">
<meta name="keywords" content="CPI Calculator, CGPA, GPA, CPI Tool, GLA University">
<meta name="author" content="Anurag Tripathi">
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --bg:#000000;
    --line:#262626;
    --text:#ffffff;
    --muted:#888888;
  }
  *{box-sizing:border-box;}
  body{ font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); }

  .field{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text);
    border-radius:4px;
    transition:border-color .15s;
  }
  .field:focus{ outline:none; border-color:var(--text); }
  .field::placeholder{ color:var(--muted); }

  .btn-primary{
    background:var(--text);
    color:#000;
    border-radius:4px;
    font-weight:600;
    transition:opacity .15s;
  }
  .btn-primary:hover{ opacity:.85; }

  .btn-outline{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text);
    border-radius:4px;
    transition:border-color .15s;
  }
  .btn-outline:hover{ border-color:var(--text); }

  .nav-link{ color:var(--muted); transition:color .15s; }
  .nav-link:hover{ color:var(--text); }
  .nav-link.active{ color:var(--text); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  ::-webkit-scrollbar-thumb{ background:#333; }
</style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="border-b border-[var(--line)]">
    <div class="container mx-auto flex justify-between items-center px-6 py-5 max-w-3xl">
      <span class="font-semibold text-base tracking-tight">CPI Calculator</span>
      <div class="flex items-center gap-7 text-sm">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-center px-6 py-20">

    <h1 class="text-3xl sm:text-4xl font-semibold text-center tracking-tight mb-2">
      Calculate your CPI
    </h1>
    <p class="text-[var(--muted)] text-center max-w-sm mb-12 text-sm">
      Enter your subject grades and get your Cumulative Performance Index instantly.
    </p>

    <!-- Calculator Card -->
    <section class="max-w-md w-full mx-auto">
      <form id="cpiForm" class="space-y-7">

        <div>
          <label for="number_ofsubjects" class="block text-xs uppercase tracking-wider text-[var(--muted)] mb-2">Number of subjects</label>
          <div class="flex flex-col sm:flex-row items-stretch gap-2">
            <input type="number" id="number_ofsubjects" min="1" max="20" placeholder="e.g. 6"
              class="field w-full sm:w-2/3 px-4 py-2.5 text-sm" />
            <button type="button" onclick="createInputs()"
              class="btn-outline px-4 py-2.5 text-sm whitespace-nowrap">
              Insert
            </button>
          </div>
        </div>

        <div id="subjectInputs" class="space-y-3 text-sm"></div>

        <button type="button" onclick="calculateCPI()"
          class="btn-primary w-full px-8 py-3 text-sm">
          Calculate CPI
        </button>

        <div id="result" class="mt-2 text-center text-sm"></div>
      </form>
    </section>

    <p class="text-[var(--muted)] text-xs mt-10 text-center max-w-xs">
      Grade points are on a 0–10 scale; use credits as assigned in your curriculum.
    </p>
  </main>

  <!-- Footer -->
  <footer class="border-t border-[var(--line)] text-[var(--muted)] text-center py-5 text-xs">
    © 2025 CPI Calculator — Built by Anurag Tripathi
    <img src="https://visitor-badge.laobi.icu/badge?page_id=anurag24-26.cpicalculator" alt="visitor badge" class="inline-block ml-2 opacity-60"/>
  </footer>

  <!-- Buy Me a Coffee Widget -->
  <script data-name="BMC-Widget" data-cfasync="false"
    src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
    data-id="anuragtripathi"
    data-description="Support me on Buy Me a Coffee!"
    data-message="Thank you for visiting!"
    data-color="#ffffff"
    data-position="Right"
    data-x_margin="18"
    data-y_margin="18">
  </script>

  <script src="index.js"></script>
</body>
</html>
