<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact – CPI Calculator</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{ --bg:#000000; --line:#262626; --text:#ffffff; --muted:#888888; }
  *{box-sizing:border-box;}
  body{ font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); }
  .nav-link{ color:var(--muted); transition:color .15s; }
  .nav-link:hover{ color:var(--text); }
  .nav-link.active{ color:var(--text); }
  .contact-row{
    border-bottom:1px solid var(--line);
    transition:opacity .15s;
  }
  .contact-row:hover{ opacity:.7; }
  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  ::-webkit-scrollbar-thumb{ background:#333; }
</style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="border-b border-[var(--line)]">
    <div class="container mx-auto flex justify-between items-center px-6 py-5 max-w-3xl">
      <span class="font-semibold text-base tracking-tight">CPI Calculator</span>
      <div class="flex items-center gap-7 text-sm">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="max-w-md w-full">
      <p class="text-xs uppercase tracking-wider text-[var(--muted)] mb-3">Contact</p>
      <h1 class="text-3xl font-semibold tracking-tight mb-2">Get in touch</h1>
      <p class="text-[var(--muted)] text-sm mb-8">Feel free to connect through any of the platforms below.</p>

      <div class="space-y-0">
        <a href="mailto:anuragtripathi2602@gmail.com" class="contact-row flex items-center justify-between py-4">
          <span class="text-xs uppercase tracking-wider text-[var(--muted)]">Email</span>
          <span class="text-sm">anuragtripathi2602@gmail.com</span>
        </a>
        <a href="https://github.com/anurag24-26" target="_blank" rel="noopener" class="contact-row flex items-center justify-between py-4">
          <span class="text-xs uppercase tracking-wider text-[var(--muted)]">GitHub</span>
          <span class="text-sm">github.com/anurag24-26</span>
        </a>
        <div class="contact-row flex items-center justify-between py-4">
          <span class="text-xs uppercase tracking-wider text-[var(--muted)]">Location</span>
          <span class="text-sm">Mathura, Uttar Pradesh, India</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-t border-[var(--line)] text-[var(--muted)] text-center py-5 text-xs">
    © 2025 CPI Calculator — Built by Anurag Tripathi
  </footer>

</body>
</html>
